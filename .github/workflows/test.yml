name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  python-unit-tests:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: pyproject.toml

      - name: Install loopcoder + dev deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest pytest-cov

      - name: Validate example YAML configs
        run: |
          loopcoder config validate \
            --install   config/install.yaml.example \
            --vllm      config/vllm.yaml.example \
            --loopcoder config/loopcoder.yaml.example

      - name: Validate every example plan
        run: |
          for f in examples/plan_*.yaml; do
            python - <<PY
          from loopcoder.plan import load_plan, topological_order
          p = load_plan("$f")
          ordered = [g.id for g in topological_order(p)]
          print(f"{p.project.name}: {ordered}")
          PY
          done

      - name: Run pytest with coverage
        run: |
          pytest agent/tests/unit/ -q \
            --cov=loopcoder \
            --cov-report=term \
            --cov-report=xml

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

  shell-syntax:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: bash -n every shell script
        run: |
          set -e
          fail=0
          while IFS= read -r f; do
            if ! bash -n "$f"; then
              echo "SYNTAX ERROR: $f"
              fail=1
            fi
          done < <(find . -type f -name '*.sh' -not -path './.venv/*' -not -path './output/*')
          exit $fail

  vscode-extension-build:
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: vscode-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: vscode-extension/package.json
      - name: Install
        run: npm install --no-audit --no-fund
      - name: TypeScript compile
        run: npx tsc -p .
